  topic: Blind Omok / Blind Gomoku — memory-bounded imperfect-recall 5-in-a-row
phases:
- duration_days: 5
  goal: Establish formal model and confirm memory-allocation novelty
  name: Phase 1 — Foundations (SQ1, SQ2)
  searches:
  - expected_hits: 20-40
    filters:
      year_max: 2026
      year_min: 1990
    id: S1
    query: imperfect recall extensive form game formalization POMDP
    relevance_criteria: Must address forgotten or decayed information sets, not just
      hidden actions
    targets:
    - google_scholar
    - semantic_scholar
    - arxiv
  - expected_hits: 10-20
    filters:
      year_min: 1997
    id: S2
    query: absentminded driver problem imperfect recall
    relevance_criteria: Self-forgetting in sequential decisions; closest known analogue
    targets:
    - google_scholar
    - semantic_scholar
  - expected_hits: 15-30
    filters:
      year_max: 2020
      year_min: 1985
    id: S3
    query: bounded memory repeated games finite automata strategies
    relevance_criteria: Memory as finite resource in game-theoretic play
    targets:
    - google_scholar
    - semantic_scholar
    - jstor
  - expected_hits: 10-25
    filters:
      year_min: 2015
    id: S4
    query: memory allocation attention mechanism board games
    relevance_criteria: Hard attention or selective memory in adversarial domains
    targets:
    - google_scholar
    - arxiv
    - acm_dl
  - expected_hits: 15-30
    filters:
      year_min: 2000
    id: S5
    query: POMDP belief state factored representation combinatorial
    relevance_criteria: Tractable belief-space approximations for large state spaces
    targets:
    - arxiv
    - semantic_scholar
- duration_days: 5
  goal: Map existing Gomoku solver results and identify transferable components
  name: Phase 2 — Gomoku Theory & Agent Design (SQ4, SQ3)
  searches:
  - expected_hits: 20-40
    filters:
      year_max: 2026
      year_min: 1990
    id: S6
    query: Gomoku threat space search proof number search Allis
    relevance_criteria: Core Gomoku solving techniques; assess which require stone-ownership
