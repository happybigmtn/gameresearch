    targets:
    - arxiv
    - semantic_scholar
  - expected_hits: 15-30
    filters:
      year_min: 2017
    id: S10
    query: PPO curriculum learning self-play imperfect information game
    relevance_criteria: RL training regimes under partial observability and asymmetric
