    targets:
    - arxiv
    - semantic_scholar
- duration_days: 3
  goal: Define metrics and investigate phase-transition hypotheses
  name: Phase 3 — Evaluation & Forgetting (SQ5, SQ6)
  searches:
  - expected_hits: 10-20
    filters:
      year_min: 2015
    id: S11
    query: evaluation metrics imperfect information game agent beyond win rate
    relevance_criteria: Metrics separating decision quality from information quality
    targets:
    - arxiv
    - semantic_scholar
    - acm_dl
  - expected_hits: 5-15
    filters:
      year_min: 2000
    id: S12
    query: phase transition percolation threshold information loss games
    relevance_criteria: Sharp performance cliffs as information degrades; analogies
      to percolation
    targets:
    - arxiv
    - google_scholar
  - expected_hits: 15-30
    filters:
      year_max: 2020
      year_min: 1965
    id: S13
    query: chess memory chunks expertise cognitive science de Groot Chase Simon
    relevance_criteria: Human memory strategies in board games; chunking as natural
      memory compression
    targets:
    - google_scholar
    - jstor
    - psycinfo
- duration_days: 2
  goal: Confirm no prior work on color-hidden Gomoku; check adjacent formulations
  name: Phase 4 — Gap Filling & Novelty Validation
  searches:
  - expected_hits: 0-5
    id: S14
    query: '"blind gomoku" OR "hidden color" OR "color hidden" gomoku OR omok'
    relevance_criteria: Direct prior art — if found, must be cited and differentiated
    targets:
    - google_scholar
    - arxiv
    - dblp
    - google_web
  - expected_hits: 5-15
    filters:
      year_min: 1980
    id: S15
    query: forgetful games bounded recall strategy combinatorial
    relevance_criteria: Alternate terminology for the same concept in OR/econ theory
    targets:
    - google_scholar
    - semantic_scholar
    - jstor
  - expected_hits: 5-20
    id: S16
    query: Devil's Plan board game analysis strategy
    relevance_criteria: Popular analysis of the TV show variant; may reveal community
      formalizations
    targets:
    - google_web
    - youtube
    - reddit
risk_mitigations:
  belief_state_intractability:
    action: Prioritize S5 results; look for Monte Carlo belief-state sampling methods
  no_prior_art_found:
    action: Broaden S14 to include 'fog of war Go', 'Kriegspiel Gomoku', 'phantom
      board game'
  rl_training_failure:
    action: Expand S8-S9 to include auxiliary reward shaping and pre-training on supervised
      memory tasks
verification_protocol:
  dedup: Merge across search engines by DOI; flag duplicates found under different
    titles
  snowball_strategy:
    backward: Check references of high-relevance hits from S1-S5
    forward: Use Semantic Scholar 'cited by' for Piccione-Rubinstein 1997, Allis 1994,
      Graves 2014
  steps:
  - 'For each source: confirm DOI or stable URL resolves'
  - Read abstract + introduction to verify relevance tag
  - 'Check citation count and venue quality (top-tier: NeurIPS, ICML, AAAI, GEB, Econometrica)'
  - 'For foundational papers (Allis, Piccione-Rubinstein, Neyman): read in full'
  - 'For technique papers (NTM, PPO, PNS): read method section + experiments'
  - Cross-reference bibliographies to find missed sources (snowball forward + backward)
