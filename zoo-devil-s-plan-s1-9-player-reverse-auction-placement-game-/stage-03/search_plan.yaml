    query: spatial voting game placement externality position competition
  targets:
  - SQ-3
- duration_days: 3
  id: phase_4_marl_methods
  name: Multi-agent RL for complex strategic environments
  searches:
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 10-20
    filters:
      fields:
      - cs.MA
      - cs.LG
      year_min: 2020
    id: S13
    purpose: Primary algorithm candidate — find convergence results, scalability limits,
      partial-observability handling
    query: MAPPO multi-agent proximal policy optimization partial observability self-play
    seed_papers:
    - Yu et al. 2022 — The Surprising Effectiveness of PPO in Cooperative Multi-Agent
      Games
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 10-15
    filters:
      fields:
      - cs.MA
      - cs.LG
      - cs.AI
      year_min: 2019
    id: S14
    purpose: Methods for classifying/taxonomizing emergent strategies from trained
      agents
    query: emergent strategy multi-agent reinforcement learning self-play taxonomy
      classification
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 8-12
    filters:
      year_min: 2017
    id: S15
    purpose: PBT as hyperparameter search and diversity mechanism for multi-agent
      training
    query: population-based training multi-agent game diverse strategies Nash
    seed_papers:
    - Jaderberg et al. 2017 — Population Based Training of Neural Networks
    - Lanctot et al. 2017 — OpenSpiel
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 8-12
    filters:
      year_min: 2018
    id: S16
    purpose: Metrics for evaluating whether trained agents approximate equilibrium
      behavior
    query: exploitability approximate Nash equilibrium multi-agent evaluation robustness
  targets:
  - SQ-5
- duration_days: 1
  id: phase_5_domain_context
  name: Devil's Plan game rules, fan analysis, and reality TV game theory
  searches:
  - engines:
    - google
    - reddit
    - youtube
    - fandom_wiki
    expected_yield: 5-15
    filters: {}
    id: S17
    purpose: Primary source for game rules — fan wikis, episode recaps, discussion
      threads documenting exact mechanics
    query: Devil's Plan Zoo rules season 1 episode game mechanics
  - engines:
    - google
    - youtube
    - reddit
    expected_yield: 3-8
    filters: {}
    id: S18
    purpose: Existing informal game-theoretic analysis of Devil's Plan games by fans
      or content creators
    query: Devil's Plan game theory analysis strategy Netflix
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 3-8
    filters:
      year_min: 2010
    id: S19
    purpose: Precedent for using reality TV as source material for game-theoretic
      research (Survivor, Big Brother, etc.)
    query: reality TV show game theory strategic interaction experimental behavioral
  targets:
  - SQ-1
- duration_days: 2
  id: phase_6_cross_cutting
  name: Cross-cutting themes and gap verification
  searches:
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 10-20
    filters:
      year_min: 2000
    id: S20
    purpose: Gap verification — confirm no existing work addresses the specific combination
