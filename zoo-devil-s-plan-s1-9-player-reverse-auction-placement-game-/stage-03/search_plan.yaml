meta:
  created: '2026-04-17'
  priority_order:
  - SQ-1_formal_game_model
  - SQ-2_dumping_equilibria
  - SQ-5_marl_emergent_strategies
  - SQ-4_type_inference_signaling
  - SQ-3_spatial_topology
  - SQ-6_price_of_hidden_information
  scope: Literature retrieval for 6 sub-questions covering formal game model, dumping
    equilibria, spatial topology effects, type inference/signaling, multi-agent RL
    emergent strategies, and price of hidden information
  topic: Zoo (Devil's Plan S1) — inverse auction theory and combinatorial placement
    with dumping equilibria
phases:
- duration_days: 3
  id: phase_1_foundations
  name: Game-theoretic foundations and adjacent formulations
  searches:
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 15-30
    filters:
      fields:
      - cs.GT
      - econ.TH
      year_min: 2000
    id: S01
    purpose: Establish formalization precedents for multi-player Bayesian games with
      combinatorial action spaces
    query: Bayesian simultaneous-move game finite type space combinatorial action
      space existence Nash equilibrium
  - engines:
    - semantic_scholar
    - google_scholar
    - jstor
    expected_yield: 10-20
    filters:
      fields:
      - econ.TH
      - cs.GT
      year_min: 1995
    id: S02
    purpose: Find the closest existing theory to Zoo's dumping mechanic — spite/sabotage
      in auction contexts
    query: spite bidding reverse auction overbidding sabotage mechanism design
    seed_papers:
    - Morgan, Steiglitz, Reis 2003 — spite bidding in common-value auctions
    - Cooper, Fang 2008 — understanding overbidding in second-price auctions
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 8-15
    filters:
      year_min: 2005
    id: S03
    purpose: Dumping congestion parallel — multiple dumpers targeting same region
      mirrors congestion externality
    query: congestion game incomplete information Bayesian heterogeneous agents
  - engines:
    - semantic_scholar
    - google_scholar
    - arxiv
    expected_yield: 5-12
    filters:
      fields:
      - cs.GT
      - cs.AI
      - math.CO
      year_min: 2010
    id: S04
    purpose: Existing work on games with spatial/grid action spaces and combinatorial
      scoring
    query: combinatorial game grid placement tile scoring optimization
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 8-15
    filters:
      year_min: 2000
    id: S05
    purpose: Zoo's lower-total-wins is structurally a reverse auction — find equilibrium
      results for reverse/lowest-bid mechanisms
    query: all-pay auction lowest-bid wins reverse first-price heterogeneous valuations
  targets:
  - SQ-1
  - SQ-2
- duration_days: 3
  id: phase_2_information_dynamics
  name: Signaling, screening, and information leakage in games
  searches:
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 20-40
    filters:
      fields:
      - econ.TH
      - cs.GT
      year_min: 2000
    id: S06
    purpose: Classical signaling theory — does Zoo's sequential-round structure produce
      separating/pooling equilibria?
    query: signaling game sequential moves type revelation pooling separating equilibrium
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 10-20
    filters:
      year_min: 2011
    id: S07
    purpose: Information design perspective — each player's placement is an involuntary
      signal to 8 receivers
    query: Bayesian persuasion information design multi-receiver network
    seed_papers:
    - Kamenica, Gentzkow 2011 — Bayesian persuasion
    - Bergemann, Morris 2019 — information design survey
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 10-15
    filters:
      year_min: 2000
    id: S08
    purpose: Quantifying information gaps — theory for SQ-6's oracle-vs-realistic
      comparison
    query: value of information incomplete information game strategic cost uncertainty
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 5-10
    filters:
      fields:
      - cs.MA
      - cs.LG
      - cs.AI
      year_min: 2018
    id: S09
    purpose: Empirical methods for measuring type leakage in multi-agent RL rollouts
    query: mutual information trajectory hidden type multi-agent partially observable
  targets:
  - SQ-4
  - SQ-6
- duration_days: 2
  id: phase_3_spatial_and_network_games
  name: Spatial game theory and topology-dependent equilibria
  searches:
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 10-20
    filters:
      fields:
      - cs.GT
      - physics.soc-ph
      year_min: 2005
    id: S10
    purpose: Does spatial structure qualitatively change equilibrium behavior vs unstructured
      games?
    query: spatial game theory grid network topology equilibrium lattice
  - engines:
    - semantic_scholar
    - arxiv
    expected_yield: 5-10
    filters:
      year_min: 2000
    id: S11
    purpose: Adjacency-dependent conditions in Zoo parallel graph coloring constraints
    query: graph coloring game competitive placement adjacency constraint
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 5-10
    filters:
      year_min: 2000
    id: S12
    purpose: Spatial competition models where position choice imposes externalities
