    query: inverse auction lowest bidder wins mechanism design equilibrium characterization
  targets:
  - SQ-1
  - SQ-2
  - SQ-3
  - SQ-4
  - SQ-5
  - SQ-6
verification:
  citation_chaining:
    backward: Reference list scan for all papers scoring ≥7/10 relevance
    forward: Semantic Scholar citing-papers API for all seed papers and top-5 results
      per search
  dedup_strategy: DOI-based dedup across all search results; title+author fuzzy match
    for preprints
  relevance_filter: 'Two-pass: abstract scan (reject <30% topical overlap), then full-text
    skim of survivors'
  saturation_criterion: Phase complete when last 10 new papers yield ≤1 novel relevant
    result
  total_expected_papers: 120-200 raw, 40-70 after relevance filtering, 20-35 core
    corpus
