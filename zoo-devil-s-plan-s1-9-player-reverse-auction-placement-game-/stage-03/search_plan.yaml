    query: multi-player auction hidden type heterogeneous objective private value
      simultaneous
  - engines:
    - semantic_scholar
    - arxiv
    - google_scholar
    expected_yield: 3-8
    filters:
      year_min: 2010
    id: S21
    purpose: Direct novelty check — does anyone study dumping/sabotage in spatial
      multi-agent games?
    query: strategic dumping sabotage externality multi-agent grid board game
  - engines:
    - semantic_scholar
    - google_scholar
    expected_yield: 5-12
    filters:
      year_min: 1995
    id: S22
    purpose: Ensure we haven't missed core reverse-auction theory that subsumes Zoo's
