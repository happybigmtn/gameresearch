    '
post_retrieval:
  citation_threshold: 'Include a paper if: (a) it is an anchor paper, (b) it appears
    in >=2

    phase queries, or (c) it has >50 citations AND is post-2015. For

    niche intersection papers (P5 Byzantine + weighing), lower threshold

    to any relevant hit regardless of citation count.'
  deduplication: 'Merge results across phases — many papers will appear in multiple

    query results (e.g., I-POMDP papers in both P2 and P4). Deduplicate

    by DOI, keeping the earliest phase assignment for priority.

    '
  gap_analysis: 'After retrieval, identify the intersection region:

    weighing_puzzles ∩ multi_agent ∩ strategic_communication.

    If this intersection is empty (expected), document it explicitly

    as the novelty claim. If non-empty, those papers become mandatory

    related work and potential competitors.

    '
  snowball_strategy: 'From each anchor paper, follow forward citations (via Semantic
    Scholar

    API or Google Scholar) to find post-2020 work. Weighing puzzle theory

    is mature (most work pre-2000) so forward citations catch rare updates.

    MARL and Bayesian persuasion are active — expect substantial post-2020

    forward citation chains.

    '
