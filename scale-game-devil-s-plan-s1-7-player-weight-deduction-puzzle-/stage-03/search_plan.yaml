meta:
  created: 2026-04-17
  goal: 'Retrieve foundational and frontier literature across three intersecting

    domains — combinatorial weighing puzzles, multi-agent POMDPs, and

    strategic communication (cheap talk / Bayesian persuasion) — to support

    formalization, bounds derivation, equilibrium analysis, and RL agent

    design for the 7-player, 3-room Scale Game.

    '
  scope_constraints:
  - Prioritize papers with formal models over empirical-only game analyses
  - Exclude popular-press recaps of Devil's Plan unless they contain strategy transcripts
  - Weight range [1..W] with W <= 20 for tractability arguments
  - Target AAMAS / AAAI / NeurIPS / EC venue standards
  topic: Scale Game (Devil's Plan S1) — Multi-Agent Weighing Puzzle
phases:
- anchor_papers:
  - Dyson (1946) — ternary encoding for balance puzzles
  - Cairns (1963) — balance weighing with spring balances
  - Aigner (1988) — Combinatorial Search (textbook ch. on weighing)
  - Bshouty & Mazzawi (2011) — optimal coin weighing with unreliable coins
  id: P1
  maps_to:
  - SQ1
  - SQ2
  name: Classical Weighing Puzzle Theory
  priority: critical
  queries:
  - databases:
    - scholar
    - mathscinet
    - zbmath
    expected_hits: 15-30
    q: counterfeit coin problem information-theoretic bounds
  - databases:
    - scholar
    - arxiv
    expected_hits: 10-20
    q: balance weighing puzzle query complexity lower bound
  - databases:
    - scholar
    - jstor
    expected_hits: 5-10
    q: Dyson 1946 weighing problem ternary encoding
  - databases:
    - scholar
    - arxiv
    expected_hits: 20-40
    q: adaptive group testing combinatorial search bounds
  - databases:
    - scholar
    - arxiv
    - dblp
    expected_hits: 0-5
    notes: Likely gap — low hit count validates novelty claim
    q: distributed weighing constraint propagation isolated rooms
  verification: 'Check that Dyson 1946 is the correct attribution (sometimes cited
    as

    Dyson''s solution to a puzzle posed by Schell in American Mathematical

    Monthly). Cross-reference Knuth TAOCP Vol 3 §6.2 for canonical treatment.

    '
